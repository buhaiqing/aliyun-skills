# Alibaba Cloud SMS Service Configuration Example
# Uses YAML anchors (TE-5) to eliminate duplication

# Default configuration
default: &default
  region_id: cn-hangzhou
  sign_name: "阿里云"
  template_type: 0  # 验证码

# Development environment
dev:
  <<: *default
  sign_name: "测试签名"
  template_code: "SMS_DEV_001"

# Production environment
prod:
  <<: *default
  sign_name: "阿里云"
  template_code: "SMS_PROD_001"

# Verification code template examples
verification_templates:
  login: &login_template
    template_type: 0
    template_content: "您的验证码是${code}，5分钟内有效。"
    remark: "登录验证码"
  
  register:
    <<: *login_template
    template_content: "您的注册验证码是${code}，10分钟内有效。"
    remark: "注册验证码"
  
  reset_password:
    <<: *login_template
    template_content: "您的密码重置验证码是${code}，5分钟内有效。"
    remark: "密码重置验证码"

# Batch sending configuration
batch_config:
  max_batch_size: 100
  rate_limit_per_second: 10
  retry_count: 3
  retry_backoff_ms: 1000

# Rate limits
rate_limits:
  per_signature: 100  # ms between sends per signature
  per_account_daily: 1000000
  per_account_monthly: 30000000

# Monitoring thresholds
monitoring:
  delivery_rate_warning: 95  # Alert if below 95%
  delivery_rate_critical: 90  # Alert if below 90%
  daily_usage_warning: 800000  # Alert at 80% of daily limit
