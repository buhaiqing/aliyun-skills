# alicloud-arch-advisor 配置示例
advisory:
  # 默认输出格式
  output_format: markdown  # markdown | json
  
  # 默认检查的支柱
  default_pillars:
    - security
    - reliability
    - performance
    - cost
    - efficiency
  
  # 数据采集配置
  data_collection:
    timeout_seconds: 120
    retry_count: 3
    
  # 评分配置
  scoring:
    waf_weight:
      security: 0.20
      reliability: 0.20
      performance: 0.20
      cost: 0.20
      efficiency: 0.20
    thresholds:
      excellent: 90  # >= 90%
      good: 80       # >= 80%
      warning: 60    # >= 60%
      critical: 0    # < 60%

# 场景配置示例
scenario_overrides:
  ecommerce:
    default_dau: 100000
    default_ha: multi-az
  gaming:
    default_dau: 50000
    default_ha: multi-region