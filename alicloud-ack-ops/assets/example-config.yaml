# Example configuration for alicloud-ack-ops
# This file serves as a template for credential and resource configuration.

credentials:
  access_key_id: "{{env.ALIBABA_CLOUD_ACCESS_KEY_ID}}"
  access_key_secret: "{{env.ALIBABA_CLOUD_ACCESS_KEY_SECRET}}"
  region_id: "{{env.ALIBABA_CLOUD_REGION_ID}}"

cluster_defaults:
  cluster_type: "ManagedKubernetes"
  region: "cn-hangzhou"
  kubernetes_version: "1.28.3-aliyun.1"
  service_cidr: "172.16.0.0/16"
  pod_cidr: "10.0.0.0/8"
  worker_instance_type: "ecs.g7.xlarge"
  num_of_nodes: 2
  key_pair: ""

node_pool_defaults:
  min_size: 1
  max_size: 10
  desired_size: 2
  instance_types:
    - "ecs.g7.xlarge"
  spot_strategy: "NoSpot"
  # spot_strategy options: NoSpot, SpotWithLimit, SpotAsPriceGo

timeouts:
  cluster_create_seconds: 1800
  cluster_upgrade_seconds: 3600
  cluster_delete_seconds: 1800
  node_pool_create_seconds: 900
  poll_interval_seconds: 30

retry:
  count: 3
  backoff_base_seconds: 10
