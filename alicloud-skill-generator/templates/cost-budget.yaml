## 7. API 集成示例

```python
#!/usr/bin/env python3
"""
成本预算 API 集成示例
"""
from typing import Dict, List, Optional
import yaml


class CostBudgetManager:
    """成本预算管理器"""

    def __init__(self, config_path: str):
        with open(config_path, 'r', encoding='utf-8') as f:
            self.config = yaml.safe_load(f)

    def validate_budget(self) -> Dict:
        """验证预算配置"""
        budget = self.config.get('budget', {})
        errors = []

        # 验证金额
        amount = budget.get('amount', {})
        if not amount.get('limit'):
            errors.append("预算金额限制不能为空")

        if amount.get('limit', 0) <= 0:
            errors.append("预算金额必须大于0")

        # 验证告警阈值
        thresholds = amount.get('alert_thresholds', [])
        if not thresholds:
            errors.append("至少需要配置一个告警阈值")

        percentages = [t.get('percentage', 0) for t in thresholds]
        if len(percentages) != len(set(percentages)):
            errors.append("告警阈值百分比不能重复")

        return {
            'valid': len(errors) == 0,
            'errors': errors
        }

    def check_threshold_status(self, current_spend: float) -> List[Dict]:
        """检查当前花费的阈值状态"""
        budget = self.config.get('budget', {})
        limit = budget.get('amount', {}).get('limit', 0)
        thresholds = budget.get('amount', {}).get('alert_thresholds', [])

        usage_percentage = (current_spend / limit) * 100 if limit > 0 else 0

        triggered = []
        for threshold in thresholds:
            pct = threshold.get('percentage', 0)
            if usage_percentage >= pct:
                triggered.append({
                    'threshold': pct,
                    'severity': threshold.get('severity', 'info'),
                    'action': threshold.get('action', 'notify'),
                    'current_usage': usage_percentage
                })

        return triggered

    def generate_alert_message(self, current_spend: float,
                              forecast: Optional[float] = None) -> str:
        """生成告警消息"""
        budget = self.config.get('budget', {})
        limit = budget.get('amount', {}).get('limit', 0)
        currency = budget.get('amount', {}).get('currency', 'CNY')

        usage_percentage = (current_spend / limit) * 100 if limit > 0 else 0
        remaining = limit - current_spend

        template = self.config.get('alerts', {}).get('templates', {}).get('body', '')

        # 替换变量
        message = template.replace('${budget_name}', self.config.get('metadata', {}).get('name', ''))
        message = message.replace('${usage_percentage}', f'{usage_percentage:.1f}')
        message = message.replace('${budget_limit}', f'{limit:,.2f}')
        message = message.replace('${current_spend}', f'{current_spend:,.2f}')
        message = message.replace('${remaining}', f'{remaining:,.2f}')
        message = message.replace('${currency}', currency)

        if forecast:
            message = message.replace('${forecast}', f'{forecast:,.2f}')

        return message

    def should_block_resources(self, current_spend: float) -> bool:
        """判断是否应阻止新资源创建"""
        budget = self.config.get('budget', {})
        limit = budget.get('amount', {}).get('limit', 0)

        if limit <= 0:
            return False

        usage_percentage = (current_spend / limit) * 100

        # 检查是否有 100% 阈值配置了 block 动作
        thresholds = budget.get('amount', {}).get('alert_thresholds', [])
        for t in thresholds:
            if t.get('percentage') >= 100 and 'block' in t.get('action', ''):
                return usage_percentage >= 100

        return False


# 使用示例
if __name__ == "__main__":
    manager = CostBudgetManager('cost-budget.yaml')

    # 验证配置
    validation = manager.validate_budget()
    print(f"配置验证: {'通过' if validation['valid'] else '失败'}")
    if not validation['valid']:
        for error in validation['errors']:
            print(f"  - {error}")

    # 检查阈值
    current_spend = 45000
    triggered = manager.check_threshold_status(current_spend)
    print(f"\n已触发阈值: {len(triggered)} 个")
    for t in triggered:
        print(f"  - {t['threshold']}% ({t['severity']})")
```

## 8. 命令行工具配置

```bash
#!/bin/bash
# cost-budget-cli.sh - 成本预算 CLI 工具

BUDGET_CONFIG="${BUDGET_CONFIG:-./cost-budget.yaml}"

# 命令: 检查预算状态
cmd_check() {
    echo "检查预算状态..."
    python3 -c "
from cost_budget_manager import CostBudgetManager
import sys

manager = CostBudgetManager('${BUDGET_CONFIG}')
validation = manager.validate_budget()

if not validation['valid']:
    print('配置无效:')
    for error in validation['errors']:
        print(f'  - {error}')
    sys.exit(1)

print('配置有效')
    "
}

# 命令: 模拟消费
cmd_simulate() {
    local spend=$1
    echo "模拟消费: ${spend} CNY"
    python3 -c "
from cost_budget_manager import CostBudgetManager

manager = CostBudgetManager('${BUDGET_CONFIG}')
triggered = manager.check_threshold_status(${spend})

if triggered:
    print(f'已触发 {len(triggered)} 个阈值告警:')
    for t in triggered:
        print(f'  [{t[\"severity\"].upper()}] {t[\"threshold\"]}% - {t[\"action\"]}')
else:
    print('未触发任何阈值')

# 检查是否需要阻止
if manager.should_block_resources(${spend}):
    print('警告: 应阻止新资源创建')
    "
}

# 命令: 生成告警消息
cmd_alert() {
    local spend=$1
    local forecast=${2:-0}
    echo "生成告警消息..."
    python3 -c "
from cost_budget_manager import CostBudgetManager

manager = CostBudgetManager('${BUDGET_CONFIG}')
message = manager.generate_alert_message(${spend}, ${forecast})
print(message)
    "
}

# 主命令
case "$1" in
    check)
        cmd_check
        ;;
    simulate)
        cmd_simulate "$2"
        ;;
    alert)
        cmd_alert "$2" "$3"
        ;;
    *)
        echo "用法: $0 {check|simulate <spend>|alert <spend> [forecast]}"
        exit 1
        ;;
esac
```

## 使用指南

1. **定义预算范围**: 编辑 scope 部分指定账号/产品/区域
2. **设置预算金额**: 配置 amount.limit 和 alert_thresholds
3. **配置通知渠道**: 设置 alerts.channels
4. **启用自动治理**: 配置 governance.rules
5. **部署配置**: 将 YAML 提交到成本管理平台
