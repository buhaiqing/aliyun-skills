# 成本预算配置模板

阿里云成本预算 YAML 配置模板。

## 1. YAML 结构模板

```yaml
# cost-budget.yaml
apiVersion: v1
kind: CostBudget
metadata:
  name: "production-cost-budget"
  description: "生产环境成本预算配置"
  created_at: "2026-01-15T00:00:00Z"
  owner: "platform-team@example.com"

# 预算周期配置
budget:
  # 周期类型: monthly / quarterly / yearly / custom
  period:
    type: monthly
    start_date: "2026-01-01"
    end_date: "2026-12-31"  # 可选，无表示永久

  # 预算金额
  amount:
    currency: CNY
    limit: 50000            # 预算上限
    alert_thresholds:       # 告警阈值
      - percentage: 50
        action: notify
        severity: info
      - percentage: 80
        action: notify
        severity: warning
      - percentage: 100
        action: notify_and_block
        severity: critical
      - percentage: 120
        action: escalate
        severity: emergency
        notify: ["director@example.com", "cfo@example.com"]

# 成本范围配置
scope:
  # 账号范围
  accounts:
    - account_id: "123456789012"
      alias: "production-account"
    - account_id: "234567890123"
      alias: "staging-account"

  # 产品范围
  products:
    include:
      - ECS
      - RDS
      - OSS
      - SLB
      - CDN
      - ACK
    exclude:
      - MARKETPLACE

  # 区域范围
  regions:
    - cn-hangzhou
    - cn-beijing
    - cn-shanghai
    - cn-shenzhen

  # 资源组范围
  resource_groups:
    - rg-production
    - rg-staging

  # 标签过滤
  tags:
    - key: Environment
      values: [Production]
    - key: Department
      values: [Platform, Infrastructure]

# 告警配置
alerts:
  # 通知渠道
  channels:
    - type: email
      recipients:
        - ops-team@example.com
        - finance@example.com

    - type: sms
      recipients:
        - "+86138xxxxxxxx"
      severity_filter: [critical, emergency]

    - type: webhook
      url: "https://hooks.example.com/budget-alerts"
      headers:
        Authorization: "Bearer xxx"

    - type: dingtalk
      webhook: "https://oapi.dingtalk.com/robot/send?access_token=xxx"
      at_users:
        - "user123"

    - type: wecom
      webhook: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxx"

  # 告警模板
  templates:
    subject: "【成本告警】${budget_name} 预算使用率已达到 ${usage_percentage}%"
    body: |
      预算名称: ${budget_name}
      当前周期: ${period}
      预算上限: ${budget_limit} ${currency}
      当前消费: ${current_spend} ${currency}
      使用率: ${usage_percentage}%
      剩余预算: ${remaining} ${currency}
      预计月度: ${forecast} ${currency}

      详细成本分布:
      ${cost_breakdown}

      查看详情: ${dashboard_url}

# 自动治理规则
governance:
  enabled: true
  rules:
    # 规则1: 自动关闭闲置资源
    - name: "auto-stop-idle-ecs"
      condition:
        metric: cpu_utilization_avg
        threshold: "< 5"
        duration: 7d
      action:
        type: stop_instance
        target: ecs
        notify_before: 24h
        dry_run: false

    # 规则2: 自动降配低负载资源
    - name: "auto-downsize-low-load"
      condition:
        metric: cpu_utilization_avg
        threshold: "< 20"
        duration: 30d
      action:
        type: recommend_downsize
        target: ecs
        create_ticket: true

    # 规则3: 过期资源清理
    - name: "cleanup-expired-resources"
      condition:
        type: expired
        days: 7
      action:
        type: notify_cleanup
        target: snapshot, disk_image

    # 规则4: 预留实例建议
    - name: "ri-recommendation"
      condition:
        on_demand_hours: "> 720"  # 超过30天*24小时
      action:
        type: recommend_ri
        instance_types: ["ecs.g7.xlarge", "ecs.c7.2xlarge"]

# 分摊配置
allocation:
  enabled: true
  rules:
    # 按标签分摊
    - dimension: tag
      key: Project
      method: proportional

    # 按资源组分摊
    - dimension: resource_group
      method: direct

    # 按业务单元分摊
    - dimension: business_unit
      mapping:
        - pattern: "*ecommerce*"
          unit: "ecommerce"
        - pattern: "*platform*"
          unit: "platform"

# 成本优化建议
optimization:
  enabled: true
  recommendations:
    - type: reserved_instance
      min_saving: 1000

    - type: savings_plan
      min_saving: 500

    - type: spot_instance
      workload_types: [batch, stateless]

    - type: storage_tiering
      target_types: [oss, disk]

# 报告配置
reports:
  enabled: true
  schedule:
    daily:
      enabled: true
      time: "09:00"
      timezone: "Asia/Shanghai"

    weekly:
      enabled: true
      day: monday
      time: "09:00"

    monthly:
      enabled: true
      day: 1
      time: "09:00"

  recipients:
    - team-leads@example.com
    - finance@example.com

  format:
    - pdf
    - excel
    - markdown

# 预测配置
forecast:
  enabled: true
  model: linear_regression  # linear_regression / arima / prophet
  horizon_days: 30
  confidence_interval: 0.95

  scenarios:
    - name: "growth_10_percent"
      multiplier: 1.10

    - name: "growth_20_percent"
      multiplier: 1.20

    - name: "reduction_10_percent"
      multiplier: 0.90

# 权限配置
permissions:
  viewers:
    - group: finance-team
    - group: ops-team

  editors:
    - group: platform-admins

  approvers:
    - user: cto@example.com
    - user: cfo@example.com
```

## 2. 预算配置示例

### 部门级预算

```yaml
# department-budget.yaml
metadata:
  name: "engineering-department-budget"
  department: "Engineering"

budget:
  period:
    type: monthly
  amount:
    currency: CNY
    limit: 100000
    alert_thresholds:
      - percentage: 70
        severity: info
      - percentage: 90
        severity: warning
      - percentage: 100
        severity: critical

scope:
  tags:
    - key: Department
      values: [Engineering]
```

### 项目级预算

```yaml
# project-budget.yaml
