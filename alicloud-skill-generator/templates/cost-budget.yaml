## 3. 阈值配置

### 多级阈值模板

```yaml
# threshold-config.yaml
threshold_levels:
  # 信息级别 - 提醒关注
  info:
    percentage: 50
    notification:
      channels: [email]
      template: info_template
    actions:
      - type: log
      - type: dashboard_update

  # 警告级别 - 需要注意
  warning:
    percentage: 80
    notification:
      channels: [email, dingtalk]
      template: warning_template
      escalate_after: 4h  # 4小时后未处理则升级
    actions:
      - type: notify
      - type: create_ticket
      - type: cost_analysis

  # 严重级别 - 立即处理
  critical:
    percentage: 100
    notification:
      channels: [email, dingtalk, sms, phone]
      template: critical_template
      require_acknowledgment: true
    actions:
      - type: immediate_notify
      - type: block_new_resources
      - type: escalation
    escalation:
      to: ["cto@example.com", "cfo@example.com"]
      delay: 0

  # 紧急级别 - 最高优先级
  emergency:
    percentage: 120
    notification:
      channels: [all]
      template: emergency_template
      on_call: true
    actions:
      - type: immediate_notify
      - type: emergency_lockdown
      - type: exec_escalation
    escalation:
      to: ["ceo@example.com"]
      delay: 0
```

### 动态阈值配置

```yaml
# dynamic-thresholds.yaml
dynamic_thresholds:
  enabled: true

  # 基于历史数据的动态阈值
  historical_based:
    enabled: true
    lookback_days: 30
    calculation: average
    std_deviation_factor: 2

  # 基于预测的动态阈值
  forecast_based:
    enabled: true
    forecast_horizon: 7
    threshold_percentage: 90

  # 异常检测阈值
  anomaly_detection:
    enabled: true
    algorithm: isolation_forest
    sensitivity: medium  # low / medium / high

  # 季节性调整
  seasonal_adjustment:
    enabled: true
    patterns:
      - type: weekly
        peak_days: [friday, saturday]
        adjustment_factor: 1.2
      - type: monthly
        peak_days: [1, 15]
        adjustment_factor: 1.3
```

## 4. 成本监控配置

```yaml
# cost-monitoring.yaml
monitoring:
  # 实时监控
  realtime:
    enabled: true
    update_interval: 5m

  # 维度监控
  dimensions:
    - name: by_product
      enabled: true
      granularity: daily

    - name: by_region
      enabled: true
      granularity: hourly

    - name: by_resource_group
      enabled: true
      granularity: daily

    - name: by_tag
      tag_key: Project
      enabled: true

  # 异常检测
  anomaly_detection:
    enabled: true
    rules:
      - name: "cost_spike_detection"
        condition:
          metric: daily_cost
          change: "> 50%"
        action: notify

      - name: "unexpected_resource_creation"
        condition:
          event: resource_create
          resource_cost: "> 1000"
        action: notify_and_audit

  # 成本归因
  attribution:
    enabled: true
    shared_costs:
      allocation_method: proportional
      based_on: usage
```

## 5. 自动化规则配置

```yaml
# automation-rules.yaml
automation:
  # 预算告警自动响应
  alert_response:
    - name: "auto-create-ticket"
      trigger:
        severity: [warning, critical]
      action:
        type: create_jira_ticket
        project: COST
        assignee: finance-team

    - name: "auto-slack-notify"
      trigger:
        severity: [critical, emergency]
      action:
        type: slack_post
        channel: "#cost-alerts"
        mention: ["@finance", "@ops-leads"]

  # 成本优化自动化
  optimization:
    - name: "auto-schedule-spot-instances"
      condition:
        workload: batch
        current_instance: on_demand
      action:
        type: migrate_to_spot
        approval_required: true

    - name: "auto-purchase-ri"
      condition:
        on_demand_hours: "> 600"
        savings_potential: "> 1000"
      action:
        type: recommend_ri_purchase
        create_approval_workflow: true

  # 资源生命周期管理
  lifecycle:
    - name: "auto-tag-untagged-resources"
      condition:
        tags: empty
        age: "> 1d"
      action:
        type: notify_owner
        subject: "请为资源打标签"

    - name: "auto-cleanup-stopped-instances"
      condition:
        status: stopped
        stopped_days: "> 30"
      action:
        type: notify_cleanup
        grace_period: 7d
```

