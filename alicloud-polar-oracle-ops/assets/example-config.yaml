# PolarDB Oracle-compatible (IO) Example Configuration

db_cluster:
  pay_type: "Postpaid"
  node_class: "polar.o.x4.medium"
  node_count: 2

network:
  vpc_id: "vpc-xxxxxxxx"
  vswitch_id: "vsw-xxxxxxxx"
  security_ip_list: "10.0.0.0/8"

backup:
  preferred_time: "02:00Z-03:00Z"
  retention_days: 30

alerts:
  cpu_warning: 80
  cpu_critical: 95
  memory_warning: 80
  connections_warning: 80
