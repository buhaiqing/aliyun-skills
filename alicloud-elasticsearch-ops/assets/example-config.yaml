# Example configuration for alicloud-elasticsearch-ops
# This file serves as a template for Elasticsearch instance configuration.

# UX Configuration
# All UX settings follow references/user-experience-spec.md
ux:
  # Onboarding settings
  onboarding:
    quick_start_enabled: true
    show_capabilities_table: true
    prerequisite_checklist: true

  # Interaction settings
  interaction:
    max_prompts_describe: 1
    max_prompts_create: 3
    max_prompts_modify: 2
    max_prompts_delete: 1
    confirmation_required_for_destructive: true
    smart_defaults_enabled: true

  # Smart defaults (applied when user does not specify)
  smart_defaults:
    instance_name_pattern: "es-cluster-{timestamp}"
    version: "7.10_aliyun"
    node_spec: "elasticsearch.sn2ne.large"
    node_count: 3
    zone_count: 3
    disk_type: "cloud_ssd"
    disk_size: 100
    region_source: "env.ALIBABA_CLOUD_REGION_ID"
    timeout_seconds: 600
    snapshot_prefix: "auto-backup-"

  # Feedback settings
  feedback:
    show_progress_for_ops_over_seconds: 10
    show_elapsed_time: true
    show_estimated_remaining: true
    success_show_next_steps: true
    failure_show_remediation: true

  # Error handling settings
  error_handling:
    format: "[ERROR] {code}: {summary}\n\nWhat happened:\n{explanation}\n\nHow to fix:\n{remediation}\n\nNext step:\n{next_action}"
    auto_retry_throttling: true
    max_retries_throttling: 3
    backoff_strategy: "exponential"
    show_request_id: true

  # Escalation settings
  escalation:
    template_enabled: true
    include_request_id: true
    include_instance_id: true
    include_error_code: true
    include_timestamp: true
    support_channel: "https://workorder.console.aliyun.com/"

# Credentials
credentials:
  access_key_id: "{{env.ALIBABA_CLOUD_ACCESS_KEY_ID}}"
  access_key_secret: "{{env.ALIBABA_CLOUD_ACCESS_KEY_SECRET}}"
  region_id: "{{env.ALIBABA_CLOUD_REGION_ID}}"

# Instance defaults
instance_defaults:
  region: "cn-hangzhou"
  version: "7.10_aliyun"
  node_spec: "elasticsearch.sn2ne.large"
  node_count: 3
  zone_count: 3
  disk_type: "cloud_ssd"
  disk_size_gb: 100
  charge_type: "PostPaid"
  timeout_seconds: 600
  poll_interval_seconds: 10

# Snapshot defaults
snapshot_defaults:
  auto_backup_enabled: true
  retention_days: 7
  cross_region_enabled: false
  backup_before_restart: true
  backup_before_upgrade: true

# Well-Architected settings
well_architected:
  security:
    https_enabled: true
    whitelist_restriction: true
    vpc_only_access: false  # Set true for production

  stability:
    min_data_nodes: 3
    dedicated_master_nodes: true
    multi_zone_deployment: true
    daily_backup: true

  cost:
    reserved_instance: false
    warm_node_enabled: false
    idle_detection_enabled: true

  performance:
    jvm_heap_percent_threshold: 80
    cpu_percent_threshold: 80
    disk_percent_threshold: 80
    search_latency_ms_threshold: 100

# SDK settings
sdk:
  package: "github.com/alibabacloud-go/elasticsearch-20170613/v6/client"
  api_version: "2017-06-13"
  endpoint: "elasticsearch.aliyuncs.com"
  go_version_minimum: "1.21"
  go_version_jit: "1.24"
  workspace_path: "/tmp/aliyun-es-workspace"
  goproxy: "https://goproxy.cn,direct"

# Retry and timeout settings
retry:
  max_retries: 3
  base_backoff_seconds: 2
  max_backoff_seconds: 30

timeout:
  create_instance_seconds: 600
  restart_instance_seconds: 300
  update_instance_seconds: 300
  delete_instance_seconds: 300
  snapshot_create_seconds: 600
  poll_interval_seconds: 10

# Optimization settings
# Follow references/optimization-analysis.md
optimization:
  # Fault diagnosis settings
  fault_diagnosis:
    pre_flight_state_validation: true
    health_check_enabled: true
    diagnose_before_alert: true
    error_taxonomy_minimum_codes: 10

  # Root cause localization settings
  root_cause:
    dependency_mapping_enabled: true
    log_correlation_enabled: true
    cluster_health_analysis: true

  # Rapid resolution settings
  rapid_resolution:
    auto_remediation_enabled: true
    auto_remediation_safe_errors:
      - Throttling
      - InternalError
      - ServiceUnavailable
    snapshot_before_fix: true
    escalation_template_standardized: true